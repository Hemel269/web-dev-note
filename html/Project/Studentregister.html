<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Register Form</title>
  </head>
  <body>
    <header>
      <h2>Student Register Form</h2>
    </header>
    <hr />
    <main>
      <form>
        <div>
          <input type="text" name="name" placeholder="Name" required /><br />
          <input
            type="email"
            name="email"
            placeholder="Your email"
            required
          /><br />
          <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
          /><br />
        </div>

        <div>
          <p>Gender:</p>
          <label><input type="radio" name="gender" value="Male" />Male</label>
          <label
            ><input type="radio" name="gender" value="Female" /> Female</label
          ><br />
        </div>
        <div>
          <label>Skill:</label>
          <input type="checkbox" name="Skill" value="Html" />Html
          <input type="checkbox" name="Skill" value="CSS" />CSS <br />
        </div>
        <div>
          <label>Birthday: <input type="date" name="date" /></label><br />
          <label for="101">Department</label>
          <select id="101" name="department">
            <option>Computer</option>
            <option>Electronics</option></select
          ><br />
          <label for="90">Upload Picture:</label>
          <input id="90" type="file" name="file" />
        </div>
        <br />
        <button type="submit">Submit</button><br />
        <button type="reset">Reset</button>
      </form>
    </main>
    <hr />
    <footer>All right go to Living Legend.</footer>
  </body>
</html>
